name: Preview Frontend — Firebase Hosting

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      # Run for PRs that TARGET main — this is the standard PR workflow.
      # branches-ignore: [main] was incorrect: the filter applies to the BASE
      # branch, so branches-ignore: [main] meant "never run for PRs to main".
      - main
    paths:
      - "misfitai-mobile/**"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/preview-frontend.yml"

permissions:
  contents: read
  checks: write        # FirebaseExtended/action-hosting-deploy creates a Check Run
  pull-requests: write # action posts the preview URL as a PR comment

jobs:
  build-and-preview:
    name: Build Expo Web & Deploy Preview Channel
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ─────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Node.js ─────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: misfitai-mobile/package-lock.json

      # ── 3. Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        working-directory: misfitai-mobile
        run: npm ci

      # ── 4. Build Expo web app ─────────────────────────────────────────────────
      # Preview builds point directly at the dev Cloud Run service (DEV_BACKEND_URL)
      # rather than the Firebase Hosting domain. This avoids the CORS issue that
      # would arise if preview channel origins tried to use the firebase.json
      # rewrites, which point to the production Cloud Run service whose
      # ALLOWED_ORIGINS does not include dynamically-generated preview URLs.
      #
      # Prerequisites: add DEV_BACKEND_URL as a GitHub repository secret after
      # the first successful run of preview-backend.yml.
      - name: Build Expo web app
        working-directory: misfitai-mobile
        env:
          EXPO_PUBLIC_API_BASE_URL: ${{ secrets.DEV_BACKEND_URL }}
          EXPO_PUBLIC_USE_MOCK_API: "false"
          EXPO_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.EXPO_PUBLIC_GA_MEASUREMENT_ID }}
          EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}
          # Preview channel URLs are dynamically generated (*.web.app with a random hash)
          # and cannot be registered in Google Cloud Console. Point OAuth redirects at
          # the stable production URL instead. That page calls maybeCompleteAuthSession()
          # which posts the token back to this window via postMessage before closing.
          EXPO_PUBLIC_OAUTH_REDIRECT_URI: "https://${{ secrets.FIREBASE_PROJECT_ID }}.web.app"
        run: npx expo export --platform web

      # ── 5. Strip Cloud Run rewrites for preview deploy ────────────────────────
      # Firebase Hosting validates every rewrite rule at deploy time by calling
      # run.services.get on the target Cloud Run service. For preview channels
      # this is wrong on two counts:
      #   1. Preview builds call DEV_BACKEND_URL directly (baked in above), so
      #      the production Cloud Run rewrites are never used.
      #   2. The production backend may not exist yet when the first PR is opened.
      # jq filters out any rewrite with a "run" key, leaving only the SPA
      # catch-all. The production firebase.json on disk is not committed back,
      # so this only affects the in-workflow deploy step.
      - name: Strip Cloud Run rewrites for preview deploy
        run: |
          jq '.hosting.rewrites = [.hosting.rewrites[] | select(.run == null)]' \
            firebase.json > firebase.tmp.json
          mv firebase.tmp.json firebase.json

      # ── 6. Deploy to Firebase Hosting preview channel ─────────────────────────
      # channelId is scoped to the PR number so every PR gets exactly one stable
      # preview URL that is updated on each push, rather than creating a new URL
      # for every commit. The action automatically posts the preview URL as a
      # comment on the PR. The channel expires after 14 days of inactivity;
      # cleanup-preview.yml also deletes it explicitly on PR close.
      - name: Deploy to Firebase Hosting preview channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
          channelId: pr-${{ github.event.pull_request.number }}
          expires: 14d
