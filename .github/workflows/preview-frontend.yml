name: Preview Frontend — Firebase Hosting

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches-ignore:
      - main
    paths:
      - "misfitai-mobile/**"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/preview-frontend.yml"

jobs:
  build-and-preview:
    name: Build Expo Web & Deploy Preview Channel
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ─────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Node.js ─────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: misfitai-mobile/package-lock.json

      # ── 3. Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        working-directory: misfitai-mobile
        run: npm ci

      # ── 4. Build Expo web app ─────────────────────────────────────────────────
      # Preview builds point directly at the dev Cloud Run service (DEV_BACKEND_URL)
      # rather than the Firebase Hosting domain. This avoids the CORS issue that
      # would arise if preview channel origins tried to use the firebase.json
      # rewrites, which point to the production Cloud Run service whose
      # ALLOWED_ORIGINS does not include dynamically-generated preview URLs.
      #
      # Prerequisites: add DEV_BACKEND_URL as a GitHub repository secret after
      # the first successful run of preview-backend.yml.
      - name: Build Expo web app
        working-directory: misfitai-mobile
        env:
          EXPO_PUBLIC_API_BASE_URL: ${{ secrets.DEV_BACKEND_URL }}
          EXPO_PUBLIC_USE_MOCK_API: "false"
          EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}
        run: npx expo export --platform web

      # ── 5. Deploy to Firebase Hosting preview channel ─────────────────────────
      # channelId is scoped to the PR number so every PR gets exactly one stable
      # preview URL that is updated on each push, rather than creating a new URL
      # for every commit. The action automatically posts the preview URL as a
      # comment on the PR. The channel expires after 14 days of inactivity;
      # cleanup-preview.yml also deletes it explicitly on PR close.
      - name: Deploy to Firebase Hosting preview channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
          channelId: pr-${{ github.event.pull_request.number }}
          expires: 14d
