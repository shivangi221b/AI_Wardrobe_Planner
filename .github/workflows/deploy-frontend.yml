name: Deploy Frontend to Firebase Hosting

on:
  push:
    branches:
      - main
    paths:
      # Rebuild and redeploy whenever the Expo app or Firebase config changes.
      - "misfitai-mobile/**"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/deploy-frontend.yml"

  # Allow manual re-deploys from the GitHub Actions UI.
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build Expo Web & Deploy to Firebase
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ─────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Node.js ─────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: misfitai-mobile/package-lock.json

      # ── 3. Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        working-directory: misfitai-mobile
        run: npm ci

      # ── 4. Build Expo web app ─────────────────────────────────────────────────
      # EXPO_PUBLIC_API_BASE_URL points to the Firebase Hosting domain so all
      # API requests pass through the firebase.json rewrites to Cloud Run.
      # This keeps the client on a single origin and avoids CORS preflight for
      # same-origin requests.
      - name: Build Expo web app
        working-directory: misfitai-mobile
        env:
          EXPO_PUBLIC_API_BASE_URL: "https://${{ secrets.FIREBASE_PROJECT_ID }}.web.app"
          EXPO_PUBLIC_USE_MOCK_API: "false"
          EXPO_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.EXPO_PUBLIC_GA_MEASUREMENT_ID }}
          EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}
          # Stable redirect URI registered in Google Cloud Console.
          # All web deployments (production and preview channels) use this same
          # URI so Google only needs one entry in its Authorized redirect URIs list.
          EXPO_PUBLIC_OAUTH_REDIRECT_URI: "https://${{ secrets.FIREBASE_PROJECT_ID }}.web.app"
        # export:web = expo export to dist/ + copy static privacy/terms HTML for Firebase Hosting
        run: npm run export:web

      # ── 5. Deploy to Firebase Hosting ────────────────────────────────────────
      # Uses the official Firebase action which reads firebase.json from the
      # repo root and deploys the 'misfitai-mobile/dist' output directory.
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}

      # ── 6. Print the live URL ─────────────────────────────────────────────────
      - name: Print live URL
        run: |
          echo "Frontend deployed to: https://${{ secrets.FIREBASE_PROJECT_ID }}.web.app" \
            >> "$GITHUB_STEP_SUMMARY"
